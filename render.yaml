services:
  - type: web
    name: game-edukasi-peer
    env: node
    plan: free
    rootDir: peer-server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: PEER_PATH
        value: /peerjs
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-site.netlify.app
